# Env precedence (highest wins):
#   1. Shell env vars (e.g. exported in ~/.zprofile) — preferred for personal dev
#   2. .env file in this directory (auto-loaded by compose for ${VAR} substitution)
#   3. Empty default (will cause runtime failure with a clear error)
#
# So `.env` is optional: if your shell already exports LIVEKIT_*/OPENAI_API_KEY,
# compose picks them up. Reviewers without those vars set should `cp .env.example .env`.

services:
  api:
    build: ./backend
    container_name: voice-tutor-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LIVEKIT_URL=${LIVEKIT_URL:-}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/voice_tutor.db}
    volumes:
      - ./backend:/app
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  agent:
    build: ./agent
    container_name: voice-tutor-agent
    environment:
      - PYTHONUNBUFFERED=1
      - LIVEKIT_URL=${LIVEKIT_URL:-}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_REALTIME_MODEL=${OPENAI_REALTIME_MODEL:-gpt-4o-realtime-preview}
    volumes:
      - ./agent:/app
    command: python agent.py dev
    depends_on:
      - api

  frontend:
    build: ./frontend
    container_name: voice-tutor-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://api:8000
      - VITE_API_URL=${VITE_API_URL:-}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - api
