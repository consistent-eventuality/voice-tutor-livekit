services:
  api:
    build: ./backend
    container_name: voice-tutor-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  agent:
    build: ./agent
    container_name: voice-tutor-agent
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./agent:/app
    command: python agent.py dev
    depends_on:
      - api

  frontend:
    build: ./frontend
    container_name: voice-tutor-frontend
    ports:
      - "5173:5173"
    env_file: .env
    environment:
      - VITE_API_PROXY_TARGET=http://api:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - api
